<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Friday?</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #111; /* Dark theme for maximum despair */
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        #main-answer {
            font-size: 20vw; /* Responsive giant text */
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -5px;
            text-transform: uppercase;
        }

        #subtext {
            font-size: 1.8rem;
            margin-top: 20px;
            color: #888;
            max-width: 800px;
            font-style: italic;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 1s; /* Makes them wait a second for the punchline */
        }

        /* Subtle entrance animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1 id="main-answer">NO.</h1>
    <p id="subtext"></p>

    <script>
        // The Aggravator Quotes Array (0 = Sunday, 1 = Monday, etc.)
        const dailyQuotes = {
            0: "It's Sunday. The weekend is practically over and Monday is actively hunting you.",
            1: "It is Monday. The weekend is a distant memory, and hope is currently offline.",
            2: "It is Tuesday. Why are you even checking? You have so far to go.",
            3: "It's Wednesday. 'Hump day' is just a polite way of saying you're only half-done suffering.",
            4: "It's Thursday. The ultimate day of false hope and extreme fatigue.",
            5: "But don't get too excited. Monday is already plotting its revenge.",
            6: "It's Saturday. Why are you checking this today? Go touch some grass."
        };

        const today = new Date().getDay();
        const mainAnswer = document.getElementById('main-answer');
        const subtext = document.getElementById('subtext');

        // Logic to determine if it's Friday (Day 5)
        if (today === 5) {
            mainAnswer.innerText = "YES.";
            mainAnswer.style.color = "#4ade80"; // A sarcastic, happy green
        } else if (today === 4) {
            mainAnswer.innerText = "ALMOST.";
            mainAnswer.style.color = "#fbbf24"; // Warning yellow for Thursday
        } else {
            mainAnswer.innerText = "NO.";
            mainAnswer.style.color = "#f87171"; // Aggressive red for the rest of the week
        }

        // Inject the depressing subtitle
        subtext.innerText = dailyQuotes[today];
    </script>

</body>
</html>
