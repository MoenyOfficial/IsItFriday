<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Friday?</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100dvh; /* Mobile-friendly viewport height */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Use Grid to perfectly stack the intro and main answer on top of each other */
        .text-container {
            display: grid;
            place-items: center;
            margin-bottom: 20px;
        }

        .text-container > * {
            grid-column: 1;
            grid-row: 1;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }

        #intro-text {
            font-size: 6vw;
            font-weight: 700;
            color: #aaa;
            letter-spacing: 2px;
        }

        #main-answer {
            font-size: 20vw;
            font-weight: 900;
            letter-spacing: -5px;
            opacity: 0; /* Hidden initially, GSAP will handle it */
            transform: scale(0);
        }

        #subtext {
            font-size: 1.8rem;
            color: #888;
            max-width: 800px;
            font-style: italic;
            font-weight: 300;
            opacity: 0; /* Hidden initially */
            transform: translateY(20px);
        }
        
        /* Media query to ensure intro text isn't too small on narrow mobile screens */
        @media (max-width: 600px) {
            #intro-text {
                font-size: 10vw;
            }
        }
    </style>
</head>
<body>

    <div class="text-container">
        <h2 id="intro-text">IS IT FRIDAY?</h2>
        <h1 id="main-answer"></h1>
    </div>
    <p id="subtext"></p>

    <script>
        // The Aggravator Quotes Array
        const dailyQuotes = {
            0: "It's Sunday. The weekend is practically over and Monday is actively hunting you.",
            1: "It is Monday. The weekend is a distant memory, and hope is currently offline.",
            2: "It is Tuesday. Why are you even checking? You have so far to go.",
            3: "It's Wednesday. 'Hump day' is just a polite way of saying you're only half-done suffering.",
            4: "It's Thursday. The ultimate day of false hope and extreme fatigue.",
            5: "But don't get too excited. Monday is already plotting its revenge.",
            6: "It's Saturday. Why are you checking this today? Go touch some grass."
        };

        const today = new Date().getDay();
        const mainAnswer = document.getElementById('main-answer');
        const subtext = document.getElementById('subtext');

        // Logic to determine if it's Friday
        if (today === 5) {
            mainAnswer.innerText = "YES.";
            mainAnswer.style.color = "#4ade80"; // Sarcastic happy green
        } else if (today === 4) {
            mainAnswer.innerText = "ALMOST.";
            mainAnswer.style.color = "#fbbf24"; // Warning yellow for Thursday
        } else {
            mainAnswer.innerText = "NO.";
            mainAnswer.style.color = "#f87171"; // Aggressive red
        }

        // Inject the depressing subtitle
        subtext.innerText = dailyQuotes[today];

        // --- GSAP ANIMATION TIMELINE ---
        
        // Create a timeline so events happen perfectly in sequence
        const tl = gsap.timeline();

        // 1. Hold the question for a moment, then shrink and fade it out
        tl.to("#intro-text", {
            opacity: 0,
            scale: 0.5,
            duration: 0.8,
            delay: 1, // Give them 1 second to read the question
            ease: "power2.inOut"
        })
        
        // 2. Spin the "NO." (or "YES.") violently into existence
        .fromTo("#main-answer", 
            { opacity: 0, rotation: -1080, scale: 0 }, // Starts invisible, spun 3 times backwards, and tiny
            { 
                opacity: 1, 
                rotation: 0, 
                scale: 1, 
                duration: 1.2, 
                ease: "back.out(1.5)" // Gives it that satisfying "snap" into place
            }
        )
        
        // 3. Float the depressing subtext in smoothly after the spin settles
        .to("#subtext", {
            opacity: 1,
            y: 0,
            duration: 1,
            ease: "power2.out"
        }, "+=0.3"); // Wait 0.3 seconds after the spin finishes before fading this in
    </script>

</body>
</html>
